    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React and Babel UMD -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Config for Theme Customization -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#03030c',
                        darkCard: '#090a16',
                        accentBlue: '#3b82f6',
                        accentPurple: '#8b5cf6',
                        accentPink: '#d946ef',
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS for Glowing Effects & Animations -->
    <style>
        body {
            background-color: #03030c;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .glow-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6, #d946ef);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .glow-btn:hover::before {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase modules imported securely -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, onSnapshot, collection, query, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Exposing safe pointers to global space for transpile script consumption
        window.FBASE = {
            initializeApp,
            getAuth,
            signInAnonymously,
            signInWithCustomToken,
            onAuthStateChanged,
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            deleteDoc,
            onSnapshot,
            collection,
            query,
            addDoc,
            getDocs
        };
    </script>

        };

        function App() {
            // Authentication States
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(null);
            const [authMode, setAuthMode] = useState(null); // 'signin' | 'signup' | null
            const [showAccountDropdown, setShowAccountDropdown] = useState(false);
            const accountMenuRef = useRef(null);

            // Auth Input Form States
            const [authName, setAuthName] = useState('');
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');

            // Fallback storage for absolute registration guarantee
            const [localUsers, setLocalUsers] = useState(() => {
                try {
                    const saved = localStorage.getItem('anvab_local_users');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    return [];
                }
            });

            // Backend Captured Logins States
            const [capturedLogins, setCapturedLogins] = useState([]);

            // Helper to get formatted string for dates
            const getFormattedDate = (dateObj) => {
                const year = dateObj.getFullYear();
                const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                const day = String(dateObj.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };

            const todayFormatted = getFormattedDate(new Date());

            // Interactive SandBox Dashboard states
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedDate, setSelectedDate] = useState(todayFormatted); // default selected date
            
            // Year and Month selection state for the Calendar
            const [calendarMonth, setCalendarMonth] = useState(new Date().getMonth());
            const [calendarYear, setCalendarYear] = useState(new Date().getFullYear());

            // Active Tasks state with explicit 'date' field supporting full user scheduling
            const [tasks, setTasks] = useState([
                { id: 1, title: 'Finish React Project', priority: 'High', completed: false, subtasks: [], date: todayFormatted },
                { id: 2, title: 'Study DSA', priority: 'Medium', completed: false, subtasks: [], date: todayFormatted },
                { id: 3, title: 'UI/UX Case Study', priority: 'Medium', completed: true, subtasks: [], date: todayFormatted },
                { id: 4, title: 'Prepare for Tech Pitch', priority: 'High', completed: false, subtasks: [], date: todayFormatted },
            ]);
            
            // Editable Schedule Configuration
            const [schedule, setSchedule] = useState([
                { id: 1, title: '👨‍💻 Deep Work (Coding)', time: '9:00 - 11:00 AM', color: 'blue' },
                { id: 2, title: '🤝 Team Sync Meeting', time: '11:30 - 12:30 PM', color: 'purple' },
                { id: 3, title: '🍱 Lunch & Refresh', time: '12:30 - 1:15 PM', color: 'gray' },
                { id: 4, title: '🚀 Project Optimization', time: '1:15 - 3:00 PM', color: 'indigo' },
            ]);
            const [isEditingSchedule, setIsEditingSchedule] = useState(false);
            const [newScheduleTitle, setNewScheduleTitle] = useState('');
            const [newScheduleTime, setNewScheduleTime] = useState('');
            const [newScheduleColor, setNewScheduleColor] = useState('blue');

            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [newTaskPriority, setNewTaskPriority] = useState('Medium');
            const [notesText, setNotesText] = useState(`## Project Strategy\n- Focus heavily on seamless mobile responsiveness.\n- Integrate advanced Tailwind features & interactive animations.\n- Ensure complete single-page robustness.`);
            const [notesSummary, setNotesSummary] = useState('');
            const [isSummarizing, setIsSummarizing] = useState(false);
            const [isBreakingTask, setIsBreakingTask] = useState(null); 
            const [chatInput, setChatInput] = useState('');
            const [chatMessages, setChatMessages] = useState([
                { role: 'assistant', text: 'Good morning, Ansh! ☀️ You have tasks scheduled on your active agenda. Would you like me to optimize your workflow?' }
            ]);
            const [isChatLoading, setIsChatLoading] = useState(false);
            const [notifications, setNotifications] = useState([]);
            
            // Focus Timer/Stopwatch State Hooks with Custom Range Configuration
            const [timerMode, setTimerMode] = useState('pomodoro'); // 'pomodoro' | 'stopwatch'
            const [timerSeconds, setTimerSeconds] = useState(1500); // 25 min default Pomodoro
            const [timerAdjustmentMinutes, setTimerAdjustmentMinutes] = useState(25); // Custom editable setting
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [elapsedStopwatchSeconds, setElapsedStopwatchSeconds] = useState(0);
            const timerRef = useRef(null);

            // Firebase References State
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            
            const chatEndRef = useRef(null);

            useEffect(() => {
                if (isTimerRunning) {
                    timerRef.current = setInterval(() => {
                        if (timerMode === 'pomodoro') {
                            setTimerSeconds(prev => {
                                if (prev <= 1) {
                                    setIsTimerRunning(false);
                                    if (timerRef.current) clearInterval(timerRef.current);
                                    showNotification("⏰ Focus session complete! Take a well-deserved break.", "success");
                                    return timerAdjustmentMinutes * 60;
                                }
                                return prev - 1;
                            });
                        } else {
                            setElapsedStopwatchSeconds(prev => prev + 1);
                        }
                    }, 1000);
                } else {
                    if (timerRef.current) clearInterval(timerRef.current);
                }
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                };
            }, [isTimerRunning, timerMode, timerAdjustmentMinutes]);

            // Sync countdown display to input changes when paused
            useEffect(() => {
                if (!isTimerRunning && timerMode === 'pomodoro') {
                    setTimerSeconds(timerAdjustmentMinutes * 60);
                }
            }, [timerAdjustmentMinutes, timerMode, isTimerRunning]);

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatMessages]);

            // Handle outside click to close dropdown menus
            useEffect(() => {
                function handleClickOutside(event) {
                    if (accountMenuRef.current && !accountMenuRef.current.contains(event.target)) {
                        setShowAccountDropdown(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            useEffect(() => {
                const initializeBackend = async () => {
                    if (typeof window.FBASE === 'undefined') {
                        console.warn("FBASE not loaded yet");
                        return;
                    }
                    const { initializeApp, getAuth, getFirestore, signInWithCustomToken, signInAnonymously } = window.FBASE;
                    
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'anvab-ai-os';
                    const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                    
                    if (!firebaseConfigStr) {
                        console.warn("Firebase configuration not found from runtime framework.");
                        return;
                    }

                    try {
                        const firebaseConfig = JSON.parse(firebaseConfigStr);
                        const app = initializeApp(firebaseConfig);
                        const firestoreInstance = getFirestore(app);
                        const authInstance = getAuth(app);
                        
                        setDb(firestoreInstance);
                        setAuth(authInstance);

                        // Mandatory Authentication before Queries
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(authInstance, __initial_auth_token);
                        } else {
                            await signInAnonymously(authInstance);
                        }
                        
                    } catch (err) {
                        console.error("Firebase init error: ", err);
                    }
                };
                initializeBackend();
            }, []);

            useEffect(() => {
                if (!db || !auth) return;
                const { collection, onSnapshot } = window.FBASE;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'anvab-ai-os';
                
                const loginsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'captured_logins');
                
                const unsubscribe = onSnapshot(loginsColRef, (snapshot) => {
                    const fetchedLogs = [];
                    snapshot.forEach((doc) => {
                        fetchedLogs.push({ id: doc.id, ...doc.data() });
                    });
                    
                    fetchedLogs.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    setCapturedLogins(fetchedLogs);
                }, (error) => {
                    console.error("Snapshot connection failed: ", error);
                });

                return () => unsubscribe();
            }, [db, auth]);

            const showNotification = (message, type = 'success') => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setNotifications(prev => prev.filter(n => n.id !== id));
                }, 4000);
            };

            const callGeminiAPI = async (chatHistoryList, systemInstruction = "") => {
                const apiKey = ""; 
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
                
                // Format chat history list into standard Gemini {"role": "user"|"model", "parts": [{"text": "..."}]}
                const formattedContents = chatHistoryList.map(msg => ({
                    role: msg.role === 'user' ? 'user' : 'model',
                    parts: [{ text: msg.text }]
                }));

                const payload = {
                    contents: formattedContents
                };
                if (systemInstruction) {
                    payload.systemInstruction = { parts: [{ text: systemInstruction }] };
                }

                let delay = 1000;
                const maxAttempts = 8; // Highly increased attempts of chat for robust error tolerance
                for (let i = 0; i < maxAttempts; i++) {
                    try {
                        const response = await fetch(endpoint, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        if (response.ok) {
                            const result = await response.json();
                            return result.candidates?.[0]?.content?.parts?.[0]?.text || "Error getting answer";
                        }
                    } catch (e) {
                        // Silent retry with exponential backoff
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
                throw new Error("Unable to reach the AI model after several attempts. Please try again.");
            };

            const handleAuthSubmit = async (e) => {
                e.preventDefault();
                if (!authEmail || !authPassword) {
                    showNotification("Please enter both email and password.", "error");
                    return;
                }

                const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
                const normalizedEmail = authEmail.trim().toLowerCase();
                if (!gmailRegex.test(normalizedEmail)) {
                    showNotification("Access denied. Please enter a valid Gmail address (ending with @gmail.com).", "error");
                    return;
                }

                // Combine Firestore synced captures and local storage credentials to verify registration
                const allAccounts = [...capturedLogins, ...localUsers];
                const existingAccount = allAccounts.find(
                    log => log.email && log.email.trim().toLowerCase() === normalizedEmail
                );

                if (authMode === 'signup') {
                    if (existingAccount) {
                        showNotification("This Gmail is already registered. Please Sign In instead.", "error");
                        return;
                    }
                    if (!authName.trim()) {
                        showNotification("Please choose a username.", "error");
                        return;
                    }

                    // Formulate and save the user's new credentials
                    const clientMeta = {
                        email: normalizedEmail,
                        password: authPassword,
                        username: authName.trim(),
                        action: 'Signup Attempt',
                        timestamp: Date.now(),
                        ip: '192.168.1.1',
                        platform: navigator.platform || 'Web Simulator'
                    };

                    // 1. Sync to local fallback storage
                    const updatedLocal = [...localUsers, clientMeta];
                    setLocalUsers(updatedLocal);
                    localStorage.setItem('anvab_local_users', JSON.stringify(updatedLocal));

                    // 2. Write safely to Firestore database if online
                    if (db) {
                        try {
                            const { collection, addDoc } = window.FBASE;
                            const appId = typeof __app_id !== 'undefined' ? __app_id : 'anvab-ai-os';
                            const loginsCol = collection(db, 'artifacts', appId, 'public', 'data', 'captured_logins');
                            await addDoc(loginsCol, clientMeta);
                        } catch (firebaseErr) {
                            console.error("Firestore capture failed: ", firebaseErr);
                        }
                    }

                    // 3. Complete and log user in instantly
                    const newUserObj = {
                        name: authName.trim(),
                        email: normalizedEmail,
                        avatar: authName.trim().substring(0, 2).toUpperCase()
                    };
                    setUser(newUserObj);
                    setIsLoggedIn(true);
                    setAuthMode(null);
                    setAuthName('');
                    setAuthEmail('');
                    setAuthPassword('');
                    showNotification(`Sign-up successful! Welcome, ${newUserObj.name}.`);

                } else {
                    // Sign In mode validation
                    if (!existingAccount) {
                        showNotification("Account does not exist. Please Sign Up to register.", "error");
                        return;
                    }

                    if (existingAccount.password !== authPassword) {
                        showNotification("Invalid password credentials. Please try again.", "error");
                        return;
                    }

                    const userObj = {
                        name: existingAccount.username || normalizedEmail.split('@')[0],
                        email: normalizedEmail,
                        avatar: (existingAccount.username || normalizedEmail).substring(0, 2).toUpperCase()
                    };
                    setUser(userObj);
                    setIsLoggedIn(true);
                    setAuthMode(null);
                    setAuthName('');
                    setAuthEmail('');
                    setAuthPassword('');
                    showNotification(`Signed in! Welcome back, ${userObj.name}.`);
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setUser(null);
                setShowAccountDropdown(false);
                showNotification("Logged out successfully.");
            };

            const handleAddScheduleBlock = (e) => {
                e.preventDefault();
                if (!newScheduleTitle || !newScheduleTime) {
                    showNotification("Please fill in all schedule fields.", "error");
                    return;
                }
                const newBlock = {
                    id: Date.now(),
                    title: newScheduleTitle,
                    time: newScheduleTime,
                    color: newScheduleColor
                };
                setSchedule(prev => [...prev, newBlock]);
                setNewScheduleTitle('');
                setNewScheduleTime('');
                showNotification("Added schedule block!");
            };

            const handleDeleteScheduleBlock = (id) => {
                setSchedule(prev => prev.filter(item => item.id !== id));
                showNotification("Removed schedule block.");
            };

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newTaskTitle.trim()) return;
                const newTask = {
                    id: Date.now(),
                    title: newTaskTitle,
                    priority: newTaskPriority,
                    completed: false,
                    subtasks: [],
                    date: selectedDate // Bind to current calendar/system active selectedDate
                };
                setTasks(prev => [newTask, ...prev]);
                setNewTaskTitle('');
                showNotification(`Added task: "${newTask.title}" for ${selectedDate}`);
            };

            const toggleTaskCompleted = (id) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const handleAITaskBreakdown = async (taskId, taskTitle) => {
                setIsBreakingTask(taskId);
                const systemPrompt = "You are an AI Productivity Specialist. Give exactly 3 clear, highly actionable bullet subtasks to complete the given user task. No extra formatting or long intros. Just a neat list.";
                try {
                    const result = await callGeminiAPI([{ role: 'user', text: `Break down this task: "${taskTitle}"` }], systemPrompt);
                    const subtaskLines = result.split('\n').filter(line => line.trim().match(/^[-*•\d]/)).map(line => line.replace(/^[-*•\d.\s]+/, '').trim());
                    
                    setTasks(prev => prev.map(t => {
                        if (t.id === taskId) {
                            return { ...t, subtasks: subtaskLines.length > 0 ? subtaskLines : ["Set primary milestone", "Establish key metrics", "Conduct finalize audit"] };
                        }
                        return t;
                    }));
                    showNotification("AI successfully broke down the task!");
                } catch (error) {
                    showNotification(error.message, 'error');
                } finally {
                    setIsBreakingTask(null);
                }
            };

            const handleAISummarize = async () => {
                setIsSummarizing(true);
                const systemPrompt = "Summarize the given markdown text/notes into exactly 3 bullet points starting with emoji keys. Make it highly engaging.";
                try {
                    const summary = await callGeminiAPI([{ role: 'user', text: notesText }], systemPrompt);
                    setNotesSummary(summary);
                    showNotification("Notes summary generated!");
                } catch (error) {
                    showNotification(error.message, 'error');
                } finally {
                    setIsSummarizing(false);
                }
            };

            const handleSendChat = async (e) => {
                if (e) e.preventDefault();
                if (!chatInput.trim()) return;

                const userText = chatInput;
                const updatedMessages = [...chatMessages, { role: 'user', text: userText }];
                setChatMessages(updatedMessages);
                setChatInput('');
                setIsChatLoading(true);

                const currentTasksStr = tasks.map(t => `- [${t.completed ? 'x' : ' '}] ${t.title} (Priority: ${t.priority}) on date ${t.date}`).join('\n');
                const currentScheduleStr = schedule.map(s => `- ${s.title} (${s.time})`).join('\n');
                
                const systemPrompt = `You are Anvab AI OS, an ultra-intelligent, highly advanced operating system companion designed to act as a world-class AI chatbot (similar to ChatGPT or Gemini). Your objective is to provide exceptionally useful, accurate, and engaging assistance in every conversation.

                Current Workspace Context (Always utilize this to stay aligned with the user's ongoing environment):
                - Tasks:
                ${currentTasksStr}
                - Schedule Blocks:
                ${currentScheduleStr}
                - Active notes:
                ${notesText}

                Core Operational Rules & Guidelines:
                1. Accuracy & Authenticity: Answer all questions accurately, naturally, and factually. Never provide misleading information. If you are uncertain about something, clearly state your uncertainty.
                2. Context Preservation: Understand conversation context and maintain complete continuity. Handle follow-up questions naturally without requiring the user to repeat previous information.
                3. Proactive Clarification: If the user's request is vague or unclear, politely ask strategic follow-up questions to understand their exact goal.
                4. Comprehensive Problem Solving: Assist with writing, clean coding, complex debugging, mathematical problem-solving, structured research, summaries, and general knowledge. Suggest better alternative solutions or creative shortcuts when relevant.
                5. Adaptive Length:
                   - Keep answers short and precise for simple, casual questions.
                   - Provide rich, deeply detailed, step-by-step instructions for complex, conceptual topics.
                6. Multi-language Autodetect: Automatically identify the language used by the user and respond entirely in that same language.
                7. Formatting & Layout: Use structured Markdown syntax beautifully. Incorporate neat bullet points, numbered lists, markdown tables, bold headings, and syntax-highlighted code blocks where applicable to maximize readability.
                8. Persona Style: Warm, human-like, polite, professional, solutions-oriented, intelligent, and highly conversational.`;

                try {
                    const reply = await callGeminiAPI(updatedMessages, systemPrompt);
                    setChatMessages(prev => [...prev, { role: 'assistant', text: reply }]);
                } catch (error) {
                    setChatMessages(prev => [...prev, { role: 'assistant', text: `⚠️ Connection status: ${error.message}. Please retry.` }]);
                } finally {
                    setIsChatLoading(false);
                }
            };

            const triggerSmartPlan = () => {
                setChatInput("Optimize and plan my day based on my priority tasks");
                setTimeout(() => {
                    handleSendChat();
                }, 100);
            };

            const focusFeatureTab = (tabName) => {
                setActiveTab(tabName);
                document.getElementById('mockup-dashboard').scrollIntoView({ behavior: 'smooth', block: 'center' });
                showNotification(`Switched demo preview to ${tabName.toUpperCase()} view!`);
            };

            const getColorClass = (color) => {
                switch(color) {
                    case 'blue': return 'bg-blue-600/10 border-blue-500 text-blue-200';
                    case 'purple': return 'bg-purple-600/10 border-purple-500 text-purple-200';
                    case 'gray': return 'bg-gray-500/10 border-gray-400 text-gray-300';
                    case 'indigo': return 'bg-indigo-600/10 border-indigo-500 text-indigo-200';
                    case 'emerald': return 'bg-emerald-600/10 border-emerald-500 text-emerald-200';
                    default: return 'bg-blue-600/10 border-blue-500 text-blue-200';
                }
            };

            const formatTimer = (totalSecs) => {
                const mins = Math.floor(totalSecs / 60);
                const secs = totalSecs % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            // Handle timer duration settings
            const handleTimerDurationChange = (minutes) => {
                const cleanMin = Math.max(1, Math.min(180, parseInt(minutes) || 1));
                setTimerAdjustmentMinutes(cleanMin);
                if (!isTimerRunning && timerMode === 'pomodoro') {
                    setTimerSeconds(cleanMin * 60);
                }
            };

            const monthsList = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            const generateYears = () => {
                const yrs = [];
                for (let y = 2010; y <= 2040; y++) {
                    yrs.push(y);
                }
                return yrs;
            };

            // Days in month logic
            const getDaysInMonth = (month, year) => {
                return new Date(year, month + 1, 0).getDate();
            };

            const getFirstDayOfMonth = (month, year) => {
                return new Date(year, month, 1).getDay(); // 0 is Sunday, 1 is Monday...
            };

            const handleDateClick = (dayNum) => {
                const yearStr = calendarYear;
                const monthStr = String(calendarMonth + 1).padStart(2, '0');
                const dayStr = String(dayNum).padStart(2, '0');
                const combined = `${yearStr}-${monthStr}-${dayStr}`;
                setSelectedDate(combined);
                showNotification(`Active date set to: ${combined}`);
            };

            // Calculate task indicators on specific dates
            const getTasksForDate = (dateString) => {
                return tasks.filter(t => t.date === dateString);
            };

            const activeTasksForSelectedDate = getTasksForDate(selectedDate);

            return (
                <div className="relative min-h-screen bg-[#03030c] text-gray-100 overflow-x-hidden selection:bg-purple-600/30 font-sans">
                    
                    {/* Ambient Background Glow Elements */}
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[650px] bg-gradient-to-b from-blue-600/10 via-purple-600/5 to-transparent rounded-full blur-[130px] pointer-events-none -z-10" />
                    <div className="absolute top-[800px] right-1/4 w-[400px] h-[400px] bg-blue-500/5 rounded-full blur-[140px] pointer-events-none -z-10" />
                    <div className="absolute bottom-[300px] left-1/4 w-[500px] h-[500px] bg-purple-500/5 rounded-full blur-[150px] pointer-events-none -z-10" />

                    {/* Toast Notification Deck */}
                    <div className="fixed top-5 right-5 z-[9999] flex flex-col gap-2 max-w-sm pointer-events-none">
                        {notifications.map(n => (
                            <div key={n.id} className={`p-4 rounded-xl shadow-2xl backdrop-blur-md flex items-center gap-3 border transition-all duration-300 transform translate-y-0 pointer-events-auto ${n.type === 'error' ? 'bg-red-950/80 border-red-500/30 text-red-200' : 'bg-gray-900/90 border-emerald-500/30 text-emerald-200'}`}>
                                <div className="w-2 h-2 rounded-full bg-current animate-pulse" />
                                <span className="text-sm font-medium">{n.message}</span>
                            </div>
                        ))}
                    </div>

                    {/* --- HEADER NAVBAR --- */}
                    <header className="sticky top-0 z-50 border-b border-white/5 bg-[#03030c]/70 backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-12 h-12 flex items-center justify-center transition-transform hover:scale-105 duration-300">
                                    <Icons.AnvabLogo className="w-full h-full" />
                                </div>
                                <span className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                    Anvab <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 font-extrabold">AI OS</span>
                                </span>
                            </div>
                            <nav className="hidden md:flex items-center gap-6 text-sm font-medium text-gray-400">
                                <a href="#operating-system" className="hover:text-white transition-colors">Overview</a>
                                <a href="#mockup-dashboard" className="hover:text-white transition-colors">Live App Demo</a>
                                <a href="#features" className="hover:text-white transition-colors">OS Features</a>
                            </nav>

                            {/* ACCOUNT SECTION HEADER */}
                            <div className="flex items-center gap-3">
                                {isLoggedIn ? (
                                    <div className="relative" ref={accountMenuRef}>
                                        <button 
                                            onClick={() => setShowAccountDropdown(!showAccountDropdown)}
                                            className="flex items-center gap-2.5 px-3 py-1.5 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all focus:outline-none"
                                        >
                                            <div className="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-500 to-purple-600 flex items-center justify-center text-xs font-bold text-white shadow-md">
                                                {user?.avatar || 'AS'}
                                            </div>
                                            <span className="hidden sm:inline text-xs font-semibold text-gray-200">
                                                {user?.name || 'Ansh'}
                                            </span>
                                            <svg className="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" />
                                            </svg>
                                        </button>

                                        {/* Dynamic Header Profile Dropdown */}
                                        {showAccountDropdown && (
                                            <div className="absolute right-0 mt-2 w-64 bg-[#0a0b16] border border-white/10 rounded-2xl shadow-2xl p-4 space-y-4 z-50 backdrop-blur-xl">
                                                <div className="border-b border-white/5 pb-3">
                                                    <div className="text-xs text-purple-400 font-bold uppercase tracking-wider mb-1">Active Account</div>
                                                    <div className="text-sm font-bold text-white">{user?.name}</div>
                                                    <div className="text-xs text-gray-400 truncate">{user?.email}</div>
                                                </div>
                                                <div className="space-y-1">
                                                    <button 
                                                        onClick={() => { focusFeatureTab('dashboard'); setShowAccountDropdown(false); }}
                                                        className="w-full text-left px-3 py-2 rounded-lg text-xs hover:bg-white/5 transition-colors text-gray-300 flex items-center gap-2"
                                                    >
                                                        📊 View Live Dashboard
                                                    </button>
                                                    <button 
                                                        onClick={handleLogout}
                                                        className="w-full text-left px-3 py-2 rounded-lg text-xs hover:bg-red-500/10 text-red-400 transition-colors flex items-center gap-2"
                                                    >
                                                        🚪 Log Out
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="flex items-center gap-2">
                                        <button 
                                            onClick={() => setAuthMode('signin')}
                                            className="px-4 py-2 text-xs font-semibold text-gray-300 hover:text-white transition-all"
                                        >
                                            Sign In
                                        </button>
                                        <button 
                                            onClick={() => setAuthMode('signup')}
                                            className="px-4 py-2 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 hover:opacity-90 text-xs font-bold transition-all text-white"
                                        >
                                            Sign Up
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* --- AUTHENTICATION MODAL (SIGN IN / SIGN UP PORTAL) --- */}
                    {authMode && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                            <div className="relative w-full max-w-md bg-[#080914] border border-white/10 rounded-3xl p-6 sm:p-8 shadow-2xl overflow-hidden">
                                <div className="absolute -top-12 -left-12 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl" />
                                <div className="absolute -bottom-12 -right-12 w-32 h-32 bg-purple-500/10 rounded-full blur-2xl" />

                                <button 
                                    onClick={() => setAuthMode(null)} 
                                    className="absolute top-4 right-4 text-gray-400 hover:text-white p-1 rounded-lg transition-colors"
                                >
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>

                                <div className="text-center mb-6">
                                    <div className="w-14 h-14 mx-auto mb-4 flex items-center justify-center bg-white/[0.02] border border-white/10 rounded-2xl">
                                        <Icons.AnvabLogo className="w-10 h-10" />
                                    </div>
                                    <h2 className="text-2xl font-black text-white">
                                        {authMode === 'signup' ? 'Create Anvab Account' : 'Welcome to Anvab OS'}
                                    </h2>
                                    <p className="text-xs text-gray-400 mt-1">
                                        Securely authenticate your credentials using a valid Gmail account.
                                    </p>
                                </div>

                                <form onSubmit={handleAuthSubmit} className="space-y-4">
                                    {authMode === 'signup' && (
                                        <div>
                                            <label className="block text-[10px] uppercase font-bold text-gray-400 tracking-wider mb-1.5">Username</label>
                                            <input 
                                                type="text" 
                                                value={authName}
                                                onChange={(e) => setAuthName(e.target.value)}
                                                placeholder="" 
                                                className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors" 
                                            />
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-[10px] uppercase font-bold text-gray-400 tracking-wider mb-1.5">Email Address</label>
                                        <input 
                                            type="email" 
                                            value={authEmail}
                                            onChange={(e) => setAuthEmail(e.target.value)}
                                            placeholder="yourname@gmail.com" 
                                            className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 transition-colors" 
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase font-bold text-gray-400 tracking-wider mb-1.5">Password</label>
                                        <input 
                                            type="password" 
                                            value={authPassword}
                                            onChange={(e) => setAuthPassword(e.target.value)}
                                            placeholder="••••••••" 
                                            className="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 transition-colors" 
                                        />
                                    </div>

                                    <button 
                                        type="submit" 
                                        className="w-full py-3 mt-2 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 hover:opacity-95 text-xs font-bold text-white transition-all shadow-lg shadow-blue-500/20"
                                    >
                                        {authMode === 'signup' ? 'Register Account' : 'Authenticate Credentials'}
                                    </button>
                                </form>

                                <div className="text-center mt-4">
                                    <button 
                                        onClick={() => setAuthMode(authMode === 'signin' ? 'signup' : 'signin')}
                                        className="text-xs text-gray-400 hover:text-purple-400 transition-colors"
                                    >
                                        {authMode === 'signin' ? "Don't have an account? Sign Up" : "Already registered? Sign In"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- HERO SECTION --- */}
                    <section className="relative pt-16 pb-12 px-4 sm:px-6 lg:px-8 text-center max-w-6xl mx-auto">
                        <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs text-gray-300 mb-8 backdrop-blur-sm shadow-inner">
                            <span className="w-2 h-2 rounded-full bg-purple-500 animate-pulse" />
                            <span className="font-medium">Experience Next-Generation Productivity Today</span>
                        </div>

                        {/* Large Brand Icon placed inside Hero */}
                        <div className="flex justify-center mb-6">
                            <div className="w-24 h-24 p-2 bg-white/[0.02] border border-white/10 rounded-full flex items-center justify-center shadow-2xl shadow-blue-500/10">
                                <Icons.AnvabLogo className="w-20 h-20" />
                            </div>
                        </div>

                        <h1 className="text-5xl sm:text-7xl lg:text-8xl font-black tracking-tight mb-8 leading-[1.1] text-white">
                            Your <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600">AI.</span> Your <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600">OS.</span> Your <span className="text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-purple-500">Life.</span>
                        </h1>
                        
                        <p className="text-base sm:text-xl text-gray-400 max-w-3xl mx-auto mb-10 leading-relaxed">
                            One intelligent platform to manage everything that matters. Bring tasks, smart notes, calendar schedules, and global goals under a unified AI-powered ecosystem.
                        </p>

                        <div className="flex flex-wrap justify-center gap-3 sm:gap-6 text-sm text-gray-300 font-medium mb-12">
                            <span className="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5 shadow-sm"><Icons.CheckCircle className="w-4 h-4 text-purple-400" /> Tasks</span>
