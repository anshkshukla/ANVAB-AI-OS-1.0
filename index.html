<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anvab AI OS - Your AI. Your OS. Your Life.</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React and Babel UMD -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Config for Theme Customization -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#03030c',
                        darkCard: '#090a16',
                        accentBlue: '#3b82f6',
                        accentPurple: '#8b5cf6',
                        accentPink: '#d946ef',
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS for Glowing Effects & Animations -->
    <style>
        body {
            background-color: #03030c;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .glow-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6, #d946ef);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .glow-btn:hover::before {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Lucide-style Inline SVG Icons for self-containment
        const Icons = {
            AnvabLogo: ({ className = "w-10 h-10" }) => (
                <svg className={className} viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="anvab-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor="#00d2ff" />
                            <stop offset="35%" stopColor="#0066ff" />
                            <stop offset="70%" stopColor="#7e22ce" />
                            <stop offset="100%" stopColor="#d946ef" />
                        </linearGradient>
                        <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor="#38bdf8" />
                            <stop offset="100%" stopColor="#c084fc" />
                        </linearGradient>
                    </defs>
                    
                    {/* Sweeping Outer Ring Segment */}
                    <path d="M 132 46 A 72 72 0 1 0 115 160" stroke="url(#anvab-grad)" strokeWidth="11" strokeLinecap="round" />
                    
                    {/* Interlocking 'A' Leg and Bridge */}
                    <path d="M 58 142 L 102 58 L 126 106" stroke="url(#anvab-grad)" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" />
                    <path d="M 76 110 L 118 110" stroke="url(#anvab-grad)" strokeWidth="10" strokeLinecap="round" />
                    
                    {/* Connected 'V' Right Segment */}
                    <path d="M 124 98 L 138 122 L 165 72" stroke="url(#anvab-grad)" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" />

                    {/* Robot Controller Face / Eye capsule at the bottom center */}
                    <rect x="83" y="126" width="38" height="20" rx="10" fill="#03030c" stroke="url(#anvab-grad)" strokeWidth="5" />
                    <circle cx="95" cy="136" r="2.5" fill="url(#anvab-grad)" />
                    <circle cx="109" cy="136" r="2.5" fill="url(#anvab-grad)" />

                    {/* Sparkles / Stars Group */}
                    {/* Top Main Star */}
                    <path d="M 155 30 Q 155 40 165 40 Q 155 40 155 50 Q 155 40 145 40 Q 155 40 155 30 Z" fill="url(#star-grad)" />
                    {/* Left Mini Star */}
                    <path d="M 136 48 Q 136 53 141 53 Q 136 53 136 58 Q 136 53 131 53 Q 136 53 136 48 Z" fill="url(#star-grad)" />
                    {/* Right Mini Star */}
                    <path d="M 172 50 Q 172 55 177 55 Q 172 55 172 60 Q 172 55 167 55 Q 172 55 172 50 Z" fill="url(#star-grad)" />
                </svg>
            ),
            Sparkles: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21L8.188 15.904L3 15L8.188 14.096L9 9L9.813 14.096L15 15L9.813 15.904Z" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M19.071 4.929a10 10 0 00-14.142 0M19.071 4.929a10 10 0 010 14.142" opacity="0.3" />
                    <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-.813-2.096L16 6l2.188-.904L19 3l.813 2.096L22 6l-2.188.904L19 9Z" />
                </svg>
            ),
            CheckCircle: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            ),
            FileText: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            ),
            Calendar: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 3V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            ),
            Target: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <circle cx="12" cy="12" r="6" />
                    <circle cx="12" cy="12" r="2" />
                </svg>
            ),
            Lock: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            ),
            Search: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            ),
            ArrowRight: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            ),
            Smartphone: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <rect x="5" y="2" width="14" height="20" rx="2" />
                    <path d="M12 18h.01" />
                </svg>
            ),
            User: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            ),
            Bell: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            ),
            Plus: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            ),
            Send: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                </svg>
            ),
            Setting: ({ className = "w-5 h-5" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            )
        };

        function App() {
            // State for Mockup Application Inside Website
            const [activeTab, setActiveTab] = useState('dashboard');
            const [tasks, setTasks] = useState([
                { id: 1, title: 'Finish React Project', priority: 'High', completed: false, subtasks: [] },
                { id: 2, title: 'Study DSA', priority: 'Medium', completed: false, subtasks: [] },
                { id: 3, title: 'UI/UX Case Study', priority: 'Medium', completed: true, subtasks: [] },
                { id: 4, title: 'Prepare for Tech Pitch', priority: 'High', completed: false, subtasks: [] },
            ]);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [newTaskPriority, setNewTaskPriority] = useState('Medium');
            const [notesText, setNotesText] = useState(`## Project Strategy\n- Focus heavily on seamless mobile responsiveness.\n- Integrate advanced Tailwind features & interactive animations.\n- Ensure complete single-page robustness.`);
            const [notesSummary, setNotesSummary] = useState('');
            const [isSummarizing, setIsSummarizing] = useState(false);
            const [isBreakingTask, setIsBreakingTask] = useState(null); 
            const [chatInput, setChatInput] = useState('');
            const [chatMessages, setChatMessages] = useState([
                { role: 'assistant', text: 'Good morning, Ansh! ☀️ You have 4 tasks on your plate and 4.2h of scheduled Focus Time today. Would you like me to optimize your flow?' }
            ]);
            const [isChatLoading, setIsChatLoading] = useState(false);
            const [notifications, setNotifications] = useState([]);
            
            // Ref for Chat Scroll
            const chatEndRef = useRef(null);

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatMessages]);

            const showNotification = (message, type = 'success') => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setNotifications(prev => prev.filter(n => n.id !== id));
                }, 4000);
            };

            const callGeminiAPI = async (prompt, systemInstruction = "") => {
                const apiKey = ""; 
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }]
                };
                if (systemInstruction) {
                    payload.systemInstruction = { parts: [{ text: systemInstruction }] };
                }

                let delay = 1000;
                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(endpoint, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        if (response.ok) {
                            const result = await response.json();
                            return result.candidates?.[0]?.content?.parts?.[0]?.text || "Error getting answer";
                        }
                    } catch (e) {
                        // Silent retry
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
                throw new Error("Unable to reach the AI model after 5 attempts. Please try again.");
            };

            const handleAddTask = (e) => {
                e.preventDefault();
                if (!newTaskTitle.trim()) return;
                const newTask = {
                    id: Date.now(),
                    title: newTaskTitle,
                    priority: newTaskPriority,
                    completed: false,
                    subtasks: []
                };
                setTasks(prev => [newTask, ...prev]);
                setNewTaskTitle('');
                showNotification(`Added task: "${newTask.title}"`);
            };

            const toggleTaskCompleted = (id) => {
                setTasks(prev => prev.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
            };

            const handleAITaskBreakdown = async (taskId, taskTitle) => {
                setIsBreakingTask(taskId);
                const systemPrompt = "You are an AI Productivity Specialist. Give exactly 3 clear, highly actionable bullet subtasks to complete the given user task. No extra formatting or long intros. Just a neat list.";
                try {
                    const result = await callGeminiAPI(`Break down this task: "${taskTitle}"`, systemPrompt);
                    const subtaskLines = result.split('\n').filter(line => line.trim().match(/^[-*•\d]/)).map(line => line.replace(/^[-*•\d.\s]+/, '').trim());
                    
                    setTasks(prev => prev.map(t => {
                        if (t.id === taskId) {
                            return { ...t, subtasks: subtaskLines.length > 0 ? subtaskLines : ["Set primary milestone", "Establish key metrics", "Conduct finalize audit"] };
                        }
                        return t;
                    }));
                    showNotification("AI successfully broke down the task!");
                } catch (error) {
                    showNotification(error.message, 'error');
                } finally {
                    setIsBreakingTask(null);
                }
            };

            const handleAISummarize = async () => {
                setIsSummarizing(true);
                const systemPrompt = "Summarize the given markdown text/notes into exactly 3 bullet points starting with emoji keys. Make it highly engaging.";
                try {
                    const summary = await callGeminiAPI(notesText, systemPrompt);
                    setNotesSummary(summary);
                    showNotification("Notes summary generated!");
                } catch (error) {
                    showNotification(error.message, 'error');
                } finally {
                    setIsSummarizing(false);
                }
            };

            const handleSendChat = async (e) => {
                if (e) e.preventDefault();
                if (!chatInput.trim()) return;

                const userText = chatInput;
                setChatMessages(prev => [...prev, { role: 'user', text: userText }]);
                setChatInput('');
                setIsChatLoading(true);

                const currentTasksStr = tasks.map(t => `- [${t.completed ? 'x' : ' '}] ${t.title} (Priority: ${t.priority})`).join('\n');
                const systemPrompt = `You are Anvab AI OS, an ultra-smart digital operating system companion. You have immediate access to the user's active context.
                User Context:
                Tasks:
                ${currentTasksStr}
                Active notes:
                ${notesText}

                Keep your response beautiful, formatting elements in clean Markdown structure, encouraging, concise, and focused on maximum productivity optimization.`;

                try {
                    const reply = await callGeminiAPI(userText, systemPrompt);
                    setChatMessages(prev => [...prev, { role: 'assistant', text: reply }]);
                } catch (error) {
                    setChatMessages(prev => [...prev, { role: 'assistant', text: `⚠️ Error setting up sync: ${error.message}` }]);
                } finally {
                    setIsChatLoading(false);
                }
            };

            const triggerSmartPlan = () => {
                setChatInput("Optimize and plan my day based on my priority tasks");
                setTimeout(() => {
                    handleSendChat();
                }, 100);
            };

            const focusFeatureTab = (tabName) => {
                setActiveTab(tabName);
                document.getElementById('mockup-dashboard').scrollIntoView({ behavior: 'smooth', block: 'center' });
                showNotification(`Switched demo preview to ${tabName.toUpperCase()} view!`);
            };

            return (
                <div className="relative min-h-screen bg-[#03030c] text-gray-100 overflow-x-hidden selection:bg-purple-600/30 font-sans">
                    
                    {/* Ambient Background Glow Elements */}
                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[650px] bg-gradient-to-b from-blue-600/10 via-purple-600/5 to-transparent rounded-full blur-[130px] pointer-events-none -z-10" />
                    <div className="absolute top-[800px] right-1/4 w-[400px] h-[400px] bg-blue-500/5 rounded-full blur-[140px] pointer-events-none -z-10" />
                    <div className="absolute bottom-[300px] left-1/4 w-[500px] h-[500px] bg-purple-500/5 rounded-full blur-[150px] pointer-events-none -z-10" />

                    {/* Toast Notification Deck */}
                    <div className="fixed top-5 right-5 z-[9999] flex flex-col gap-2 max-w-sm pointer-events-none">
                        {notifications.map(n => (
                            <div key={n.id} className={`p-4 rounded-xl shadow-2xl backdrop-blur-md flex items-center gap-3 border transition-all duration-300 transform translate-y-0 pointer-events-auto ${n.type === 'error' ? 'bg-red-950/80 border-red-500/30 text-red-200' : 'bg-gray-900/90 border-emerald-500/30 text-emerald-200'}`}>
                                <div className="w-2 h-2 rounded-full bg-current animate-pulse" />
                                <span className="text-sm font-medium">{n.message}</span>
                            </div>
                        ))}
                    </div>

                    {/* --- HEADER NAVBAR --- */}
                    <header className="sticky top-0 z-50 border-b border-white/5 bg-[#03030c]/70 backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="w-12 h-12 flex items-center justify-center transition-transform hover:scale-105 duration-300">
                                    <Icons.AnvabLogo className="w-full h-full" />
                                </div>
                                <span className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                    Anvab <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 font-extrabold">AI OS</span>
                                </span>
                            </div>
                            <nav className="hidden md:flex items-center gap-8 text-sm font-medium text-gray-400">
                                <a href="#operating-system" className="hover:text-white transition-colors">Overview</a>
                                <a href="#mockup-dashboard" className="hover:text-white transition-colors">Live App Demo</a>
                                <a href="#features" className="hover:text-white transition-colors">OS Features</a>
                            </nav>
                            <a href="#mockup-dashboard" className="px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm font-semibold hover:bg-white/10 transition-all">
                                Try Demo Live
                            </a>
                        </div>
                    </header>

                    {/* --- HERO SECTION --- */}
                    <section className="relative pt-16 pb-12 px-4 sm:px-6 lg:px-8 text-center max-w-6xl mx-auto">
                        <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs text-gray-300 mb-8 backdrop-blur-sm shadow-inner">
                            <span className="w-2 h-2 rounded-full bg-purple-500 animate-pulse" />
                            <span className="font-medium">Experience Next-Generation Productivity Today</span>
                        </div>

                        {/* Large Brand Icon placed inside Hero */}
                        <div className="flex justify-center mb-6">
                            <div className="w-24 h-24 p-2 bg-white/[0.02] border border-white/10 rounded-full flex items-center justify-center shadow-2xl shadow-blue-500/10">
                                <Icons.AnvabLogo className="w-20 h-20" />
                            </div>
                        </div>

                        <h1 className="text-5xl sm:text-7xl lg:text-8xl font-black tracking-tight mb-8 leading-[1.1] text-white">
                            Your <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600">AI.</span> Your <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600">OS.</span> Your <span className="text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-purple-500">Life.</span>
                        </h1>
                        
                        <p className="text-base sm:text-xl text-gray-400 max-w-3xl mx-auto mb-10 leading-relaxed">
                            One intelligent platform to manage everything that matters. Bring tasks, smart notes, calendar schedules, and global goals under a unified AI-powered ecosystem.
                        </p>

                        <div className="flex flex-wrap justify-center gap-3 sm:gap-6 text-sm text-gray-300 font-medium mb-12">
                            <span className="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5 shadow-sm"><Icons.CheckCircle className="w-4 h-4 text-purple-400" /> Tasks</span>
                            <span className="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5 shadow-sm"><Icons.FileText className="w-4 h-4 text-blue-400" /> Notes</span>
                            <span className="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5 shadow-sm"><Icons.Calendar className="w-4 h-4 text-purple-400" /> Calendar</span>
                            <span className="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5 shadow-sm"><Icons.Target className="w-4 h-4 text-blue-400" /> Goals</span>
                            <span className="flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/5 shadow-sm"><Icons.Sparkles className="w-4 h-4 text-purple-400" /> AI Assistant</span>
                        </div>
                    </section>

                    {/* --- WORKFLOW / SYSTEM PREVIEW SECTION --- */}
                    <section id="operating-system" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 border-t border-white/5">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                            
                            {/* Left Side Copywriting Pillars */}
                            <div className="lg:col-span-4 space-y-8">
                                <div>
                                    <h2 className="text-3xl sm:text-4xl font-extrabold tracking-tight text-white mb-4">
                                        Your Digital Operating System
                                    </h2>
                                    <p className="text-gray-400 text-sm leading-relaxed">
                                        Anvaab AI OS is your all-in-one productivity hub that thinks, plans, and acts alongside you. Break through fragmentation, build momentum, and master your life goals.
                                    </p>
